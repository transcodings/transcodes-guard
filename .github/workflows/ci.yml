name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.node-version }}-

      - name: Install
        run: npm ci

      - name: Build plugin
        run: npm run build:plugin

      # NOTE: byte-equality dist-sync gate intentionally removed.
      # We previously asserted `git diff --exit-code` on every dist/ dir to catch
      # stale committed bundles. That gate is unsatisfiable: the bundle output is
      # not byte-reproducible across build environments — esbuild embeds relative
      # module paths (e.g. `../../../node_modules/ajv/...`) into chunks, so npm
      # hoisting/layout differences between a contributor's machine and CI change
      # the content-hashed chunk filenames even when sources are identical. The
      # result was a permanently-red `main` regardless of dist freshness.
      # Freshness is now guarded behind: (1) `npm run build:plugin` must succeed,
      # (2) the gitignore guard below (dist files physically exist), and (3) the
      # host smoke tests (24) which exercise the freshly-built hook entries.

      # gitignore negation guard: after the workspace flatten, dist is only
      # tracked via `!packages/*/dist/` + `!plugins/*/dist/` negation globs. If a glob ever stops
      # matching, `git diff --exit-code` above silently passes (no diff) while
      # the dist is actually ignored — and hosts that clone get no runnable
      # files. Assert the compiled hook entries physically exist.
      - name: Verify plugin dist files exist (gitignore guard)
        run: |
          for f in plugins/*/dist/hooks/pre-tool-use.js; do
            test -f "$f" || { echo "::error::missing $f — dist may be gitignored"; exit 1; }
          done

      # ─────────────────────────────────────────────────────────
      # Biome lint + format check (no --write).
      # Fails if any source file deviates from biome.json conventions or
      # contains lint errors. noRestrictedImports (gate-backend seam boundary)
      # is an error: only the plugins/*/backend.ts seams may import
      # @transcodes-guard/gate-backend (biome.json overrides).
      - name: Biome check
        run: npx biome check --reporter=github

      # ─────────────────────────────────────────────────────────
      # Publish-surface gate.
      # Asserts each packages/* member keeps "private": true so no internal
      # workspace library can leak out as a separate npm tarball.
      # If a future commit drops the flag, this step fails loudly.
      - name: Publish-surface — internal packages must stay private
        run: |
          MISSING=0
          for dir in packages/*/; do
            pkg=$(node -p "require('./${dir}package.json').name")
            is_private=$(node -p "require('./${dir}package.json').private === true")
            if [ "$is_private" != "true" ]; then
              echo "::error::${pkg} (${dir}) is missing \"private\": true"
              MISSING=1
            else
              echo "OK: ${pkg} marked private"
            fi
          done
          exit $MISSING

      # ─────────────────────────────────────────────────────────
      # Unit tests (node:test via tsx). Currently stepup-core only —
      # policy-bundle fetch/verify/cache core (Phase 3 v2 Unit G1).
      - name: stepup-core unit tests
        run: npm test -w @transcodes-guard/stepup-core

      # ─────────────────────────────────────────────────────────
      # Claude Code plugin smoke tests (10 scenarios).
      # All inputs are static JSON literals; no GitHub event injection
      # surface exists in this job.
      # ─────────────────────────────────────────────────────────

      - name: claude-code · regex block (rm -rf /)
        run: |
          set -e
          OUT=$(echo '{"tool_name":"Bash","tool_input":{"command":"rm -rf /"},"cwd":"'"$PWD"'"}' \
            | node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not exit 0 for danger command"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"deny"' || { echo "::error::Deny JSON missing"; exit 1; }

      - name: claude-code · safe command passes (ls)
        run: |
          set -e
          OUT=$(echo '{"tool_name":"Bash","tool_input":{"command":"ls"},"cwd":"'"$PWD"'"}' \
            | node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not allow safe command"; exit 1; }

      - name: claude-code · protected MCP tool denied (retire_member) + arg context
        run: |
          set -e
          OUT=$(echo '{"tool_name":"mcp__plugin_transcodes-guard_transcodes-guard__retire_member","tool_input":{"body":{"member_id":"m_ci_test"}}}' \
            | node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not exit 0 for protected MCP tool"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"deny"' || { echo "::error::Deny JSON missing for protected MCP tool"; exit 1; }
          echo "$OUT" | grep -q 'm_ci_test' || { echo "::error::block.command did not include MCP tool_input arg context"; exit 1; }

      - name: claude-code · unprotected MCP tool passes (get_member)
        run: |
          set -e
          OUT=$(echo '{"tool_name":"mcp__plugin_transcodes-guard_transcodes-guard__get_member","tool_input":{"member_id":"x"}}' \
            | node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not allow unprotected MCP tool"; exit 1; }
          if echo "$OUT" | grep -q '"permissionDecision"'; then
            echo "::error::Unexpected permissionDecision output for unprotected MCP tool"; exit 1
          fi

      - name: claude-code · verified record → explicit allow for MCP (system rule defers consume)
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          NOW=$(node -e 'console.log(Date.now())')
          echo "{\"sid\":\"ci-test-sid\",\"verifiedAt\":$NOW}" > "$HOME/.transcodes/state/stepup-verified.json"
          OUT=$(echo '{"tool_name":"mcp__plugin_transcodes-guard_transcodes-guard__retire_member","tool_input":{"body":{"member_id":"x"}}}' \
            | node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not exit 0 with verified record"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"allow"' || { echo "::error::Explicit allow JSON missing despite verified record"; exit 1; }
          test -f "$HOME/.transcodes/state/stepup-verified.json" || { echo "::error::MCP system rule fast-path consumed verified record (should defer to handler)"; exit 1; }
          rm -f "$HOME/.transcodes/state/stepup-verified.json"
          rm -f "$HOME/.transcodes/state/stepup-pending.json"

      - name: claude-code · bundle rule fast-path consumes verified in hook (consume_in_hook true)
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          NOW=$(node -e 'console.log(Date.now())')
          # Project policy now lives in the backend bundle (user-file layer retired).
          # A bundle rule with consume_in_hook:true takes the hook-side fast-path.
          TOKEN=$(node -e 'const p=Buffer.from(JSON.stringify({oid:"org-ci",pid:"proj-ci",mid:"m-ci",aud:["transcodes-mcp"],exp:Math.floor(Date.now()/1000)+3600})).toString("base64url");console.log("eyJhbGciOiJub25lIn0."+p+".x")')
          printf '{"fetchedAt":%s,"bundle":{"revision":"rev-ci","rules":[{"id":"ci-consume-rule","toolName":"mcp__ci_consume_tool","reason":"CI consume_in_hook smoke","stepupAction":"delete","stepupResource":"system","consume_in_hook":true}]}}' "$NOW" \
            > "$HOME/.transcodes/state/policy-bundle.proj-ci.json"
          # consume_in_hook=true → the verified record is CONTENT-ADDRESSED by the
          # command fingerprint (fp = sha256("<toolName>:<JSON.stringify(tool_input)>").slice(0,16)).
          # Backend is unreachable (127.0.0.1:9 → status 0) so recheckVerifiedSid
          # returns "trust" (availability fallback), exercising the consume path.
          FP=$(node -e 'const c=require("crypto");process.stdout.write(c.createHash("sha256").update(process.argv[1]).digest("hex").slice(0,16))' 'mcp__ci_consume_tool:{"arg":"v"}')
          echo "{\"sid\":\"ci-consume-sid\",\"verifiedAt\":$NOW}" > "$HOME/.transcodes/state/stepup-verified.$FP.json"
          OUT=$(echo '{"tool_name":"mcp__ci_consume_tool","tool_input":{"arg":"v"}}' \
            | TRANSCODES_TOKEN="$TOKEN" TRANSCODES_BACKEND_URL=http://127.0.0.1:9 node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not exit 0 for bundle rule fast-path"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"allow"' || { echo "::error::Explicit allow JSON missing for bundle rule consume path"; exit 1; }
          if [ -f "$HOME/.transcodes/state/stepup-verified.$FP.json" ]; then
            echo "::error::Bundle rule fast-path did NOT consume fp-keyed verified record (consume_in_hook=true expected)"; exit 1
          fi
          rm -f "$HOME/.transcodes/state/policy-bundle.proj-ci.json"
          rm -f "$HOME/.transcodes/state/stepup-verified.$FP.json"
          rm -f "$HOME/.transcodes/state/stepup-pending.json"

      - name: claude-code · Stop hook reaps orphan verified+pending(verified) silently
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          NOW=$(node -e 'console.log(Date.now())')
          EXP=$(node -e 'console.log(new Date(Date.now() + 300000).toISOString())')
          echo "{\"sid\":\"orphan-sid\",\"verifiedAt\":$NOW}" > "$HOME/.transcodes/state/stepup-verified.json"
          cat > "$HOME/.transcodes/state/stepup-pending.json" <<JSON
          {"sid":"orphan-sid","command":"ci-orphan-test","reason":"orphan test","browserUrl":"http://localhost/x","createdAt":$NOW,"expiresAt":"$EXP","status":"verified"}
          JSON
          OUT=$(printf '' | node plugins/claude-code/dist/hooks/stop.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Stop hook did not exit 0"; exit 1; }
          if echo "$OUT" | grep -q '"decision":"block"'; then
            echo "::error::Stop hook emitted false reminder for orphan verified+pending"; exit 1
          fi
          if [ -f "$HOME/.transcodes/state/stepup-verified.json" ]; then
            echo "::error::Stop hook did not reap orphan verified.json"; exit 1
          fi
          if [ -f "$HOME/.transcodes/state/stepup-pending.json" ]; then
            echo "::error::Stop hook did not reap orphan pending.json"; exit 1
          fi

      - name: claude-code · fail-closed row 1 — fresh bundle cache gates the tool (G3)
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          TOKEN=$(node -e 'const p=Buffer.from(JSON.stringify({oid:"org-ci",pid:"proj-ci",mid:"m-ci",aud:["transcodes-mcp"],exp:Math.floor(Date.now()/1000)+3600})).toString("base64url");console.log("eyJhbGciOiJub25lIn0."+p+".x")')
          NOW=$(node -e 'console.log(Date.now())')
          printf '{"fetchedAt":%s,"bundle":{"revision":"rev-ci","rules":[{"id":"ci-bundle-rule","toolName":"mcp__ci_bundle_tool","reason":"CI bundle smoke","stepupAction":"delete","stepupResource":"system"}]}}' "$NOW" \
            > "$HOME/.transcodes/state/policy-bundle.proj-ci.json"
          OUT=$(echo '{"tool_name":"mcp__ci_bundle_tool","tool_input":{"a":1}}' \
            | TRANSCODES_TOKEN="$TOKEN" TRANSCODES_BACKEND_URL=http://127.0.0.1:9 node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not exit 0 for bundle-gated tool"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"deny"' || { echo "::error::Fresh bundle cache did not gate the tool"; exit 1; }
          echo "$OUT" | grep -q 'ci-bundle-rule' || { echo "::error::Deny did not carry the bundle rule id"; exit 1; }
          rm -f "$HOME/.transcodes/state/policy-bundle.proj-ci.json" "$HOME/.transcodes/state/stepup-pending.json"

      - name: claude-code · fail-closed row 2 — stale bundle cache is last-known-good (G3)
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          TOKEN=$(node -e 'const p=Buffer.from(JSON.stringify({oid:"org-ci",pid:"proj-ci",mid:"m-ci",aud:["transcodes-mcp"],exp:Math.floor(Date.now()/1000)+3600})).toString("base64url");console.log("eyJhbGciOiJub25lIn0."+p+".x")')
          OLD=$(node -e 'console.log(Date.now()-7200000)')
          printf '{"fetchedAt":%s,"bundle":{"revision":"rev-ci","rules":[{"id":"ci-bundle-rule","toolName":"mcp__ci_bundle_tool","reason":"CI bundle smoke","stepupAction":"delete","stepupResource":"system"}]}}' "$OLD" \
            > "$HOME/.transcodes/state/policy-bundle.proj-ci.json"
          OUT=$(echo '{"tool_name":"mcp__ci_bundle_tool","tool_input":{"a":1}}' \
            | TRANSCODES_TOKEN="$TOKEN" TRANSCODES_BACKEND_URL=http://127.0.0.1:9 node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not exit 0 for stale-bundle case"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"deny"' || { echo "::error::Stale bundle cache was not used as last-known-good"; exit 1; }
          echo "$OUT" | grep -q 'ci-bundle-rule' || { echo "::error::Deny did not carry the bundle rule id"; exit 1; }
          rm -f "$HOME/.transcodes/state/policy-bundle.proj-ci.json" "$HOME/.transcodes/state/stepup-pending.json"

      - name: claude-code · fail-closed row 3 — no cache + backend unreachable → baseline deny (G3)
        run: |
          set -e
          # Baseline system rules (retire_member = id:tc-retire-member) must gate
          # even when no policy-bundle cache exists and the backend is unreachable.
          OUT=$(echo '{"tool_name":"mcp__plugin_transcodes-guard_transcodes-guard__retire_member","tool_input":{"body":{"member_id":"m_ci_test"}}}' \
            | TRANSCODES_BACKEND_URL=http://127.0.0.1:9 node plugins/claude-code/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Hook did not exit 0 for baseline-only case"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"deny"' || { echo "::error::Baseline system rules did not gate the tool without bundle cache"; exit 1; }
          echo "$OUT" | grep -q 'tc-retire-member' || { echo "::error::Deny did not carry the baseline rule id"; exit 1; }
          rm -f "$HOME/.transcodes/state/stepup-pending.json"

      # ─────────────────────────────────────────────────────────
      # Codex CLI plugin smoke tests (3 scenarios — minimum coverage that
      # proves wire-format parity. Codex's hooks share the same stepup-core
      # evaluate function, so we focus on adapter correctness rather than
      # repeating every scenario from the claude-code suite.)
      # ─────────────────────────────────────────────────────────

      - name: codex · PreToolUse regex deny (rm -rf /)
        run: |
          set -e
          OUT=$(echo '{"tool_name":"Bash","tool_input":{"command":"rm -rf /"},"cwd":"'"$PWD"'"}' \
            | node plugins/codex/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Codex hook did not exit 0 for danger command"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"deny"' || { echo "::error::Codex deny JSON missing"; exit 1; }

      - name: codex · PreToolUse verified-record → explicit allow
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          NOW=$(node -e 'console.log(Date.now())')
          # Bash consumes in the hook → verified record is CONTENT-ADDRESSED by
          # the command fingerprint (fp = sha256("<command>").slice(0,16)).
          FP=$(node -e 'const c=require("crypto");process.stdout.write(c.createHash("sha256").update(process.argv[1]).digest("hex").slice(0,16))' 'rm -rf /tmp/x')
          echo "{\"sid\":\"codex-ci-sid\",\"verifiedAt\":$NOW}" > "$HOME/.transcodes/state/stepup-verified.$FP.json"
          OUT=$(echo '{"tool_name":"Bash","tool_input":{"command":"rm -rf /tmp/x"},"cwd":"'"$PWD"'"}' \
            | node plugins/codex/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Codex hook did not exit 0 with verified record"; exit 1; }
          echo "$OUT" | grep -q '"permissionDecision":"allow"' || { echo "::error::Codex explicit allow JSON missing despite verified record"; exit 1; }
          if [ -f "$HOME/.transcodes/state/stepup-verified.$FP.json" ]; then
            echo "::error::Codex Bash fast-path did NOT consume fp-keyed verified record"; exit 1
          fi
          rm -f "$HOME/.transcodes/state/stepup-pending.json"

      - name: codex · Stop hook clean state
        run: |
          set -e
          rm -f "$HOME/.transcodes/state/stepup-verified.json"
          rm -f "$HOME/.transcodes/state/stepup-pending.json"
          OUT=$(printf '' | node plugins/codex/dist/hooks/stop.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Codex Stop hook did not exit 0"; exit 1; }
          if echo "$OUT" | grep -q '"decision":"block"'; then
            echo "::error::Codex Stop hook unexpectedly emitted a block reminder on clean state"; exit 1
          fi

      # ─────────────────────────────────────────────────────────
      # Antigravity 2.0 plugin smoke tests (5 scenarios — wire format is
      # different from Claude Code/Codex (top-level `decision` instead of
      # `hookSpecificOutput.permissionDecision`, nested `toolCall.name`/
      # `toolCall.args` stdin), so we cover the verb mismatch + the
      # PreInvocation hybrid that subsumes SessionStart + UserPromptSubmit.
      # See docs/research/antigravity-e2e-findings.md for the 4 unknowns
      # pending manual binary validation before public release.)
      # ─────────────────────────────────────────────────────────

      - name: antigravity · PreToolUse regex deny (rm -rf /)
        run: |
          set -e
          OUT=$(echo '{"toolCall":{"name":"run_command","args":{"CommandLine":"rm -rf /","Cwd":"'"$PWD"'"}},"stepIdx":0,"conversationId":"ag-ci","workspacePaths":["'"$PWD"'"]}' \
            | node plugins/antigravity/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Antigravity hook did not exit 0 for danger command"; exit 1; }
          echo "$OUT" | grep -q '"decision":"deny"' || { echo "::error::Antigravity deny JSON missing (expected top-level decision, not hookSpecificOutput)"; exit 1; }
          if echo "$OUT" | grep -q '"hookSpecificOutput"'; then
            echo "::error::Antigravity hook wrongly emitted hookSpecificOutput wrapper (Claude Code wire format leaked)"; exit 1
          fi

      - name: antigravity · PreToolUse verified-record → explicit allow
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          NOW=$(node -e 'console.log(Date.now())')
          # run_command maps to the Bash kind; the adapter rewrites CommandLine
          # → command, so fp = sha256("<command>").slice(0,16).
          FP=$(node -e 'const c=require("crypto");process.stdout.write(c.createHash("sha256").update(process.argv[1]).digest("hex").slice(0,16))' 'rm -rf /tmp/x')
          echo "{\"sid\":\"ag-ci-sid\",\"verifiedAt\":$NOW}" > "$HOME/.transcodes/state/stepup-verified.$FP.json"
          OUT=$(echo '{"toolCall":{"name":"run_command","args":{"CommandLine":"rm -rf /tmp/x","Cwd":"'"$PWD"'"}},"stepIdx":0,"conversationId":"ag-ci","workspacePaths":["'"$PWD"'"]}' \
            | node plugins/antigravity/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Antigravity hook did not exit 0 with verified record"; exit 1; }
          echo "$OUT" | grep -q '"decision":"allow"' || { echo "::error::Antigravity explicit allow JSON missing despite verified record"; exit 1; }
          if [ -f "$HOME/.transcodes/state/stepup-verified.$FP.json" ]; then
            echo "::error::Antigravity run_command fast-path did NOT consume fp-keyed verified record"; exit 1
          fi
          rm -f "$HOME/.transcodes/state/stepup-pending.json"

      - name: antigravity · Stop hook clean state
        run: |
          set -e
          rm -f "$HOME/.transcodes/state/stepup-verified.json"
          rm -f "$HOME/.transcodes/state/stepup-pending.json"
          OUT=$(printf '' | node plugins/antigravity/dist/hooks/stop.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Antigravity Stop hook did not exit 0"; exit 1; }
          if echo "$OUT" | grep -q '"decision":"continue"'; then
            echo "::error::Antigravity Stop hook unexpectedly emitted a continue reminder on clean state"; exit 1
          fi

      - name: antigravity · PreInvocation invocationNum=1 injects primer
        run: |
          set -e
          OUT=$(echo '{"invocationNum":1,"initialNumSteps":0,"conversationId":"ag-ci","transcriptPath":"/tmp/ag-ci-nonexistent.jsonl","workspacePaths":["'"$PWD"'"]}' \
            | node plugins/antigravity/dist/hooks/pre-invocation.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Antigravity PreInvocation did not exit 0"; exit 1; }
          echo "$OUT" | grep -q '"injectSteps"' || { echo "::error::Antigravity PreInvocation missed primer injectSteps on invocationNum=1"; exit 1; }
          echo "$OUT" | grep -q 'step-up MFA protocol primer' || { echo "::error::Antigravity PreInvocation primer content missing"; exit 1; }

      - name: antigravity · PreInvocation invocationNum=5 no primer
        run: |
          set -e
          OUT=$(echo '{"invocationNum":5,"initialNumSteps":10,"conversationId":"ag-ci"}' \
            | node plugins/antigravity/dist/hooks/pre-invocation.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Antigravity PreInvocation did not exit 0 (n=5)"; exit 1; }
          if echo "$OUT" | grep -q '"injectSteps"'; then
            echo "::error::Antigravity PreInvocation should NOT inject primer on invocationNum=5"; exit 1
          fi

      # ─────────────────────────────────────────────────────────
      # Cursor IDE plugin smoke tests (6 scenarios — wire format is FLAT
      # `{permission, user_message, agent_message}` (no hookSpecificOutput
      # wrapper) and Stop uses `followup_message` instead of `decision:
      # "block"`. beforeSubmitPrompt has no additional_context channel so
      # the test verifies the side-effect path (consume verified + clear
      # pending) and the always-`{ continue: true }` output.)
      # ─────────────────────────────────────────────────────────

      - name: cursor · beforeShellExecution regex deny (rm -rf /)
        run: |
          set -e
          OUT=$(echo '{"tool_name":"Shell","tool_input":{"command":"rm -rf /"},"cwd":"'"$PWD"'"}' \
            | node plugins/cursor/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Cursor hook did not exit 0 for danger command"; exit 1; }
          echo "$OUT" | grep -q '"permission":"deny"' || { echo "::error::Cursor flat deny JSON missing"; exit 1; }
          if echo "$OUT" | grep -q '"hookSpecificOutput"'; then
            echo "::error::Cursor hook wrongly emitted hookSpecificOutput wrapper (Claude Code wire format leaked)"; exit 1
          fi

      - name: cursor · beforeShellExecution safe command passes (ls)
        run: |
          set -e
          OUT=$(echo '{"tool_name":"Shell","tool_input":{"command":"ls"},"cwd":"'"$PWD"'"}' \
            | node plugins/cursor/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Cursor hook did not allow safe command"; exit 1; }

      - name: cursor · beforeShellExecution verified-record → explicit allow
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          NOW=$(node -e 'console.log(Date.now())')
          # Shell maps to the Bash kind → fp = sha256("<command>").slice(0,16).
          FP=$(node -e 'const c=require("crypto");process.stdout.write(c.createHash("sha256").update(process.argv[1]).digest("hex").slice(0,16))' 'rm -rf /tmp/x')
          echo "{\"sid\":\"cursor-ci-sid\",\"verifiedAt\":$NOW}" > "$HOME/.transcodes/state/stepup-verified.$FP.json"
          OUT=$(echo '{"tool_name":"Shell","tool_input":{"command":"rm -rf /tmp/x"},"cwd":"'"$PWD"'"}' \
            | node plugins/cursor/dist/hooks/pre-tool-use.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Cursor hook did not exit 0 with verified record"; exit 1; }
          echo "$OUT" | grep -q '"permission":"allow"' || { echo "::error::Cursor explicit allow JSON missing despite verified record"; exit 1; }
          if [ -f "$HOME/.transcodes/state/stepup-verified.$FP.json" ]; then
            echo "::error::Cursor Shell fast-path did NOT consume fp-keyed verified record"; exit 1
          fi
          rm -f "$HOME/.transcodes/state/stepup-pending.json"

      - name: cursor · sessionStart with pending → additional_context
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          NOW=$(node -e 'console.log(Date.now())')
          EXP=$(node -e 'console.log(new Date(Date.now() + 300000).toISOString())')
          cat > "$HOME/.transcodes/state/stepup-pending.json" <<JSON
          {"sid":"cursor-ss-test","command":"rm -rf /","reason":"ci test","browserUrl":"http://x","createdAt":$NOW,"expiresAt":"$EXP","status":"pending"}
          JSON
          OUT=$(printf '' | node plugins/cursor/dist/hooks/session-start.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Cursor sessionStart hook did not exit 0"; exit 1; }
          echo "$OUT" | grep -q '"additional_context"' || { echo "::error::Cursor sessionStart missing flat additional_context"; exit 1; }
          if echo "$OUT" | grep -q '"hookSpecificOutput"'; then
            echo "::error::Cursor sessionStart wrongly emitted hookSpecificOutput wrapper"; exit 1
          fi
          rm -f "$HOME/.transcodes/state/stepup-pending.json"

      - name: cursor · Stop hook clean state
        run: |
          set -e
          rm -f "$HOME/.transcodes/state/stepup-verified.json"
          rm -f "$HOME/.transcodes/state/stepup-pending.json"
          OUT=$(printf '' | node plugins/cursor/dist/hooks/stop.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Cursor Stop hook did not exit 0"; exit 1; }
          if echo "$OUT" | grep -q '"followup_message"'; then
            echo "::error::Cursor Stop hook unexpectedly emitted followup_message on clean state"; exit 1
          fi

      - name: cursor · beforeSubmitPrompt 'done' consumes verified
        run: |
          set -e
          mkdir -p "$HOME/.transcodes/state"
          NOW=$(node -e 'console.log(Date.now())')
          EXP=$(node -e 'console.log(new Date(Date.now() + 300000).toISOString())')
          echo "{\"sid\":\"cursor-bsp-sid\",\"verifiedAt\":$NOW}" > "$HOME/.transcodes/state/stepup-verified.json"
          cat > "$HOME/.transcodes/state/stepup-pending.json" <<JSON
          {"sid":"cursor-bsp-sid","command":"rm","reason":"r","browserUrl":"http://x","createdAt":$NOW,"expiresAt":"$EXP","status":"verified"}
          JSON
          OUT=$(echo '{"prompt":"인증 완료"}' \
            | node plugins/cursor/dist/hooks/before-submit-prompt.js 2>&1; printf '\nEXIT:%s' "$?")
          echo "$OUT"
          echo "$OUT" | grep -q "EXIT:0" || { echo "::error::Cursor beforeSubmitPrompt did not exit 0"; exit 1; }
          echo "$OUT" | grep -q '"continue":true' || { echo "::error::Cursor beforeSubmitPrompt missed continue:true"; exit 1; }
          if [ -f "$HOME/.transcodes/state/stepup-verified.json" ]; then
            echo "::error::Cursor beforeSubmitPrompt 'done' did NOT consume verified record"; exit 1
          fi
          rm -f "$HOME/.transcodes/state/stepup-pending.json"
