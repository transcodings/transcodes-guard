name: Release

# release-please가 main의 conventional commit을 읽어 Release PR을 만들고, 그 PR이
# 머지되면 ① 버전 bump 커밋 ② CHANGELOG.md ③ git tag(transcodes-guard-vX.Y.Z) 를
# 자동 생성한다. Release PR은 아래 auto-merge 스텝이 **자동 approve 없이 즉시 머지**
# 하므로 사람이 손댈 일이 없다. plugin 배포는 GitHub repository 자체를 공개 채널로
# 쓴다 — 호스트(Claude Code/Codex/Antigravity/Cursor)가 repo URL을 직접 참조해
# 설치하므로, 각 release tag가 곧 배포 단위다. CLI(@bigstrider/transcodes-cli)는
# 예외로 npm 채널을 쓴다. 채널 매트릭스는 docs/research/multi-host-plugin-distribution.md.
#
# 토큰: GITHUB_TOKEN으로 만든/머지한 이벤트는 워크플로를 재트리거하지 않는다(recursive
# 방지). 그래서 ① Release PR에 CI가 돌고 ② 머지가 다음 release-please run(태그 생성)을
# 트리거하려면 PAT가 필요하다 → secret `RELEASE_PLEASE_TOKEN`(repo+workflow scope)을
# 등록하면 자동 사용하고, 없으면 GITHUB_TOKEN으로 폴백한다(이 경우 태그는 다음 push 때
# 생성됨). 자동 머지는 repo Settings의 "Allow auto-merge"가 켜져 있으면 체크 통과 후
# 머지, 아니면 즉시 머지로 폴백한다.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please는 root package.json 버전만 bump하고 부수 산출물은
      # 동기화하지 않는다 — ① package-lock.json의 workspace 버전 엔트리
      # ② stamp-build-info가 생성하는 version.ts/build-info.ts ③ 번들 dist.
      # 이걸 두면 매 release 후 셋이 stale해진다(게이트 완화 후 무해하지만 untidy).
      # Release PR 브랜치에서 직접 재생성해 커밋한다.
      # best-effort: 동기화가 실패해도 release를 막지 않는다(staleness는 cosmetic).
      # PAT로 push해야 PR CI가 재실행된다(GITHUB_TOKEN push는 워크플로 미트리거).
      - name: Resolve Release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          RELEASE_PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          BRANCH=$(printf '%s' "$RELEASE_PR_JSON" | jq -r '.headBranchName')
          echo "release_branch=$BRANCH" >> "$GITHUB_ENV"

      - name: Checkout Release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' && env.release_branch != '' && env.release_branch != 'null' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ env.release_branch }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: ${{ steps.release.outputs.prs_created == 'true' && env.release_branch != '' && env.release_branch != 'null' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Sync lockfile + dist + version stamp
        id: sync
        if: ${{ steps.release.outputs.prs_created == 'true' && env.release_branch != '' && env.release_branch != 'null' }}
        continue-on-error: true
        run: |
          set -e
          npm ci
          npm install --package-lock-only
          npm run build:plugin
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No artifact drift to commit."
          else
            git commit -m "chore: sync lockfile + dist + version stamp"
            git push origin "HEAD:${release_branch}"
          fi

      # release-please가 Release PR을 생성/갱신했으면 자동 머지한다.
      # PR 번호는 run 안에서 jq로 파싱한다 — `pr` output이 비어 있을 때
      # env에서 fromJSON('')을 평가하면 워크플로 템플릿이 깨지기 때문(이 step은
      # prs_created 게이트 + 직전 step success로만 도므로 보통 비지 않지만 방어).
      - name: Auto-merge the Release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          RELEASE_PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -e
          PR_NUMBER=$(printf '%s' "$RELEASE_PR_JSON" | jq -r '.number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No Release PR number resolved; skipping."; exit 0
          fi
          echo "Auto-merging Release PR #$PR_NUMBER"
          # auto-merge(체크 통과 후 머지) 우선, 불가하면 즉시 머지로 폴백.
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --merge --auto \
            || gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --merge
