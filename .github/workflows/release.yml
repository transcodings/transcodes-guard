name: Release

# release-please가 main의 conventional commit을 읽어 Release PR을 만들고,
# 그 PR이 머지되면 ① 버전 bump 커밋 ② CHANGELOG.md
# ③ git tag(transcodes-guard-vX.Y.Z) 를 자동 생성한다.
#
# **실제 배포(npm publish 등)는 이 workflow에 없다.** 배포 채널을 아직 정하지
# 않았기 때문이다 — Claude Code는 marketplace(git source)가 정식 경로이고 npm은
# 선택적 채널이며, Codex/Antigravity/Cursor는 npm이 아니라 호스트 네이티브 방식으로
# 설치된다(조사·계획: docs/research/multi-host-plugin-distribution.md). 따라서
# 기능 개발 동안에는 버전·CHANGELOG·tag 기록만 자동 유지하고, 배포 결정이 서면
# 그때 publish 단계(또는 별도 workflow)를 추가한다.
#
# CI(ci.yml)와 분리한 이유: 이 workflow는 태그·Release PR 생성을 위해
# contents/pull-requests write 권한이 필요하다.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
