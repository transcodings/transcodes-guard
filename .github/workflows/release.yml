name: Release

# release-please가 main의 conventional commit을 읽어 Release PR을 만들고, 그 PR이
# 머지되면 ① 버전 bump 커밋 ② CHANGELOG.md ③ git tag(transcodes-guard-vX.Y.Z) 를
# 자동 생성한다. Release PR은 아래 auto-merge 스텝이 **자동 approve 없이 즉시 머지**
# 하므로(발행 보류 상태라 안전 — 버전·CHANGELOG·tag 기록만 자동 진행) 사람이 손댈 일이
# 없다. **실제 npm publish/배포 단계는 없다** — 배포 채널 미확정(docs/research/
# multi-host-plugin-distribution.md). 채널이 정해지면 그때 publish step을 추가한다.
#
# 토큰: GITHUB_TOKEN으로 만든/머지한 이벤트는 워크플로를 재트리거하지 않는다(recursive
# 방지). 그래서 ① Release PR에 CI가 돌고 ② 머지가 다음 release-please run(태그 생성)을
# 트리거하려면 PAT가 필요하다 → secret `RELEASE_PLEASE_TOKEN`(repo+workflow scope)을
# 등록하면 자동 사용하고, 없으면 GITHUB_TOKEN으로 폴백한다(이 경우 태그는 다음 push 때
# 생성됨). 자동 머지는 repo Settings의 "Allow auto-merge"가 켜져 있으면 체크 통과 후
# 머지, 아니면 즉시 머지로 폴백한다.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please가 Release PR을 생성/갱신했으면 자동 머지한다.
      # PR 번호는 run 안에서 jq로 파싱한다 — `pr` output이 비어 있을 때
      # env에서 fromJSON('')을 평가하면 워크플로 템플릿이 깨지기 때문(이 step은
      # prs_created 게이트 + 직전 step success로만 도므로 보통 비지 않지만 방어).
      - name: Auto-merge the Release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          RELEASE_PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -e
          PR_NUMBER=$(printf '%s' "$RELEASE_PR_JSON" | jq -r '.number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No Release PR number resolved; skipping."; exit 0
          fi
          echo "Auto-merging Release PR #$PR_NUMBER"
          # auto-merge(체크 통과 후 머지) 우선, 불가하면 즉시 머지로 폴백.
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --merge --auto \
            || gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --merge
